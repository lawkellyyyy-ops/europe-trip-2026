<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Europe 2026 Masterplan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
          colors: { brand: { blue: '#8EB8C9', green: '#A3C4A8', gold: '#D4AF37', cream: '#FDFBF7', teal: '#2c6e63' } }
        }
      }
    }
  </script>
  <style>
    body { background-color: #FDFBF7; -webkit-tap-highlight-color: transparent; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    [v-cloak] { display: none; }
    .flight-divider { position: relative; border-top: 2px solid #e5e7eb; margin: 20px 0; }
    .flight-divider::after { content: '✈'; position: absolute; top: -12px; right: 0; color: #9ca3af; font-size: 14px; }
  </style>
</head>
<body class="text-gray-800 antialiased font-sans pb-24">
  <div id="app" v-cloak>
    
    <header class="relative w-full">
      <img src="bannertop.png" alt="Europe Trip Banner" class="w-full h-[250px] object-cover block">
      
      <div class="absolute bottom-10 right-4 flex space-x-2 z-20">
        <button v-for="tab in tabs" :key="tab.id" @click="currentTab = tab.id"
          class="flex items-center justify-center w-10 h-10 rounded-full shadow-md transition-all duration-300"
          :class="currentTab === tab.id ? 'bg-brand-gold text-white' : 'bg-white/90 text-gray-600'">
          <i :class="tab.icon"></i>
        </button>
      </div>
    </header>

    <main class="relative z-10 bg-brand-cream rounded-t-[30px] -mt-6 min-h-screen px-4 pt-6">
      <div v-show="currentTab === 'itinerary'" class="animate-fade-in">
        <h1 class="text-2xl font-serif font-semibold text-gray-800 mb-4">L'Itinéraire</h1>
        
        <div class="flex overflow-x-auto hide-scrollbar space-x-3 mb-6 pb-2">
          <button v-for="(day, index) in itineraryDays" :key="index" @click="selectDate(index)"
            class="flex flex-col items-center min-w-[70px] py-2 px-3 rounded-2xl transition-colors border"
            :class="selectedDateIndex === index ? 'bg-brand-blue text-white border-brand-blue' : 'bg-white text-gray-500 border-gray-200'">
            <span class="text-xs font-semibold uppercase">{{ day.weekday }}</span>
            <span class="text-xl font-bold font-serif">{{ day.date }}</span>
          </button>
        </div>

        <div class="space-y-4 relative">
          <div class="absolute left-6 top-0 bottom-0 w-0.5 bg-gray-200 z-0"></div>
          <div v-for="(item, index) in currentDayData.events" :key="item.id" class="relative z-10">
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 ml-12 relative">
                <div class="absolute -left-8 top-5 w-4 h-4 rounded-full border-4 border-white shadow-sm" :class="getTypeColor(item.type)"></div>
                <div class="flex items-center space-x-2">
                    <span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600">{{ item.time }}</span>
                    <h3 class="font-semibold text-gray-800 leading-tight">{{ item.name }}</h3>
                </div>
                <p v-if="item.notes" class="bg-gray-50 p-2 rounded-lg mt-2 italic text-gray-500 text-xs">{{ item.notes }}</p>
            </div>
          </div>
        </div>
      </div>

      <div v-show="currentTab === 'info'" class="animate-fade-in space-y-6">
        <h3 class="font-semibold text-gray-800 mb-3">Accommodations</h3>
        <div class="space-y-3">
          <div v-for="hotel in hotels" :key="hotel.name" class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
            <p class="font-semibold text-sm">{{ hotel.name }}</p>
            <p class="text-xs text-gray-500">{{ hotel.dates }}</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const { createApp, ref, computed } = Vue;
    createApp({
      setup() {
        const tabs = [
          { id: 'itinerary', icon: 'fa-regular fa-calendar-days' },
          { id: 'info', icon: 'fa-solid fa-circle-info' }
        ];
        const currentTab = ref('itinerary');
        const selectedDateIndex = ref(0);
        
        const itineraryDays = ref([
          {
            weekday: 'Sat', date: '2', city: 'Brussels',
            events: [
              { id: 1, type: 'flight', time: '08:25', name: 'Arrive Brussels (CX 275)' },
              { id: 2, type: 'food', time: '10:30', name: 'Brunch: Woodpecker 47', notes: 'Peck Special waffles' },
              { id: 3, type: 'attraction', time: '12:00', name: 'Grand Place' }
            ]
          }
          // Add more days from your Masterplan as needed
        ]);

        const currentDayData = computed(() => itineraryDays.value[selectedDateIndex.value]);
        const selectDate = (idx) => selectedDateIndex.value = idx;
        const getTypeColor = (type) => ({ flight: 'bg-brand-teal', food: 'bg-orange-400', attraction: 'bg-brand-blue' }[type] || 'bg-gray-400');
        const hotels = [
          { name: 'OPO Hotel, Brussels', dates: 'May 2' },
          { name: 'Renaissance Amsterdam', dates: 'May 3 - May 7' },
          { name: 'Citadines Les Halles, Paris', dates: 'May 7 - May 13' }
        ];

        return { tabs, currentTab, itineraryDays, selectedDateIndex, currentDayData, selectDate, getTypeColor, hotels };
      }
    }).mount('#app');
  </script>
</body>
</html>
